<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | UCSC Athletics</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');

        :root {
            --bg-base: #09090b;
            --card-bg: rgba(24, 24, 27, 0.85);
            --primary: #6366f1;
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-base);
            background-image: radial-gradient(ellipse at top, rgba(99,102,241,0.15) 0%, transparent 50%);
            color: var(--text-main);
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .auth-container {
            width: 100%; max-width: 400px; padding: 40px;
            background: var(--card-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center;
        }

        .auth-container img { height: 70px; margin-bottom: 15px; }
        h2 { font-family: 'Syne', sans-serif; margin: 0 0 10px; font-size: 2em; color: var(--primary); }
        p { color: var(--text-muted); font-size: 0.9em; margin-bottom: 25px; }

        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.8em; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; color: var(--text-muted); }
        
        input {
            width: 100%; padding: 12px 15px; background: #0f172a; border: 1px solid var(--border);
            color: white; border-radius: 10px; font-family: 'DM Sans', sans-serif; box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); }

        .btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .toggle-link { margin-top: 20px; font-size: 0.9em; color: var(--text-muted); cursor: pointer; }
        .toggle-link span { color: var(--primary); font-weight: bold; text-decoration: underline; }

        .hidden { display: none; }
        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #1e293b; padding: 12px 24px; border-radius: 30px; font-size: 0.9em;
            border: 1px solid var(--border); opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="auth-container">
        <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
        
        <div id="loginForm">
            <h2>Welcome Back</h2>
            <p>Enter your credentials to access the portal.</p>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="logEmail" required placeholder="e.g. student@ucsc.cmb.ac.lk">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="logPass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Log In</button>
            </form>
            <div class="toggle-link" onclick="toggleForms()">New student? <span>Create an account</span></div>
            <p style="margin-top: 20px; font-size: 0.75em; color: var(--text-muted);">
                <b>Admin Login:</b> admin@ucsc.lk | <b>Pass:</b> 1234
            </p>
        </div>

        <div id="signupForm" class="hidden">
            <h2>Student Sign Up</h2>
            <p>Create your athletic profile.</p>
            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" required placeholder="e.g. Kaveesha S.">
                </div>
                <div class="form-group">
                    <label>Student Index Number</label>
                    <input type="text" id="regIndex" required placeholder="e.g. 26000123">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" required placeholder="student@ucsc.cmb.ac.lk">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPass" required placeholder="Create a password">
                </div>
                <button type="submit" class="btn" style="background: linear-gradient(135deg, var(--accent), #059669);">Create Account</button>
            </form>
            <div class="toggle-link" onclick="toggleForms()">Already have an account? <span>Log in</span></div>
        </div>
    </div>

    <script>
        // Admin Master Credentials
        const ADMIN_EMAIL = "admin@ucsc.lk";
        const ADMIN_PASS = "1234";

        function showToast(msg, color) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.borderColor = color;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function toggleForms() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('signupForm').classList.toggle('hidden');
        }

        function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const index = document.getElementById('regIndex').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value;

            let users = JSON.parse(localStorage.getItem('ucsc_users')) || [];
            
            if (users.find(u => u.email === email)) {
                showToast("Email already registered!", "var(--danger)");
                return;
            }

            users.push({ name, index, email, password: pass });
            localStorage.setItem('ucsc_users', JSON.stringify(users));
            
            showToast("Account created! Please log in.", "var(--accent)");
            toggleForms(); // Switch back to login view
            document.getElementById('logEmail').value = email;
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('logEmail').value.trim();
            const pass = document.getElementById('logPass').value;

            // Check if it's the Admin
            if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
                sessionStorage.setItem('activeUser', JSON.stringify({ role: 'admin', name: 'Staff Admin' }));
                window.location.href = 'admin.html';
                return;
            }

            // Check if it's a Student
            let users = JSON.parse(localStorage.getItem('ucsc_users')) || [];
            let student = users.find(u => u.email === email && u.password === pass);

            if (student) {
                sessionStorage.setItem('activeUser', JSON.stringify({ role: 'student', name: student.name, index: student.index }));
                window.location.href = 'index.html';
            } else {
                showToast("Invalid email or password", "var(--danger)");
            }
        }
    </script>
</body>
</html>
